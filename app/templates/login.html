{% extends "base.html" %}
{% block title %}Вход — AlienSig{% endblock %}
{% block wrapper_class %}login-wrap{% endblock %}

{% block content %}
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-icon">🛸</div>
    <div class="login-title">AlienSig Classifier</div>
    <div class="login-subtitle">Классификация инопланетных радиосигналов</div>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login">
    <div class="form-group">
      <label>Логин</label>
      <input type="text" name="username" placeholder="Введите логин" required autofocus>
    </div>
    <div class="form-group">
      <label>Пароль</label>
      <input type="password" name="password" placeholder="Введите пароль" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
      Войти
    </button>
  </form>
</div>
{% endblock %}
